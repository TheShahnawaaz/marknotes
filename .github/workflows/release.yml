name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Bump version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Update package.json
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='${VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n');"
          # Update tauri.conf.json
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); p.version='${VERSION}'; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2)+'\n');"
          # Update Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Extract section between this version and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Trim leading/trailing whitespace
          NOTES=$(echo "$NOTES" | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See the assets below to download and install this version."
          fi
          # Use delimiter to handle multiline
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkNotes ${{ github.ref_name }}'
          releaseBody: '${{ steps.changelog.outputs.notes }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fetch release assets info
          RELEASE=$(gh release view "$TAG" --json assets,body --repo "$REPO")
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')

          # Helper: download a .sig file from the release and emit its contents.
          # Fails the workflow if the signature is missing — better to break the
          # release than to ship a latest.json with empty signatures (the updater
          # will then reject every download with a confusing "Download failed").
          get_sig() {
            local sig_file="$1"
            if ! gh release download "$TAG" --repo "$REPO" --pattern "$sig_file" --dir /tmp >/dev/null 2>&1; then
              echo "ERROR: signature file '$sig_file' not found in release $TAG." >&2
              echo "Make sure TAURI_SIGNING_PRIVATE_KEY is set in repo secrets and that bundle.targets includes 'app' (mac) and 'nsis' (windows)." >&2
              exit 1
            fi
            cat "/tmp/$sig_file"
          }

          # Tauri's updater needs platform-specific archive formats, NOT the raw
          # installer files: .app.tar.gz on macOS, .nsis.zip on Windows. The .dmg
          # and .exe/.msi are for first-time manual installs only.
          AARCH64_APP="MarkNotes_${VERSION}_aarch64.app.tar.gz"
          X64_APP="MarkNotes_${VERSION}_x64.app.tar.gz"
          X64_NSIS="MarkNotes_${VERSION}_x64-setup.nsis.zip"

          AARCH64_SIG=$(get_sig "${AARCH64_APP}.sig")
          X64_APP_SIG=$(get_sig "${X64_APP}.sig")
          X64_NSIS_SIG=$(get_sig "${X64_NSIS}.sig")

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${BASE_URL}/${AARCH64_APP}"
              },
              "darwin-x86_64": {
                "signature": "${X64_APP_SIG}",
                "url": "${BASE_URL}/${X64_APP}"
              },
              "windows-x86_64": {
                "signature": "${X64_NSIS_SIG}",
                "url": "${BASE_URL}/${X64_NSIS}"
              }
            }
          }
          EOF

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
