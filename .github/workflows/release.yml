name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Bump version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # package.json is the single source of truth for the app version.
          # tauri.conf.json reads it via "version": "../package.json", and the
          # frontend reads it through Tauri's getVersion() at runtime.
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='${VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n');"
          # Cargo.toml version is just Rust crate metadata (not user-facing),
          # but keep it synced for clean release commits.
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Extract section between this version and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Trim leading/trailing whitespace
          NOTES=$(echo "$NOTES" | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See the assets below to download and install this version."
          fi
          # Use delimiter to handle multiline
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkNotes ${{ github.ref_name }}'
          releaseBody: '${{ steps.changelog.outputs.notes }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # tauri-action auto-generates and uploads `latest.json` (with real
          # signatures and the correct `.app.tar.gz` / `.exe` URLs) when the
          # signing secrets are present. Don't try to write our own — the asset
          # filenames are not stable across Tauri versions and the hand-rolled
          # JSON is what shipped empty signatures in 1.0.0–1.0.5.
